<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hikmal Maulana | Portfolio</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background: linear-gradient(135deg,#0f172a,#1e1b4b,#0b1220);
    color:white;
    padding:20px;

    transition: all 0.4s ease;
}

/* CARD GLASS */
.card{
    width:100%;
    max-width:420px;
    padding:25px;
    border-radius:25px;
    background: rgba(255,255,255,0.08);
    backdrop-filter: blur(18px);
    border: 1px solid rgba(255,255,255,0.15);
    box-shadow: 0 10px 40px rgba(0,0,0,0.5);
    text-align:center;
    animation: fade 1s ease;
}

@keyframes fade{
    from{opacity:0; transform:translateY(20px);}
    to{opacity:1; transform:translateY(0);}
}

/* PROFILE */
.profile{
    width:110px;
    height:110px;
    border-radius:50%;
    object-fit:cover;
    border:3px solid white;
    margin-bottom:15px;
}

/* TEXT */
h1{
    font-size:22px;
    margin-bottom:5px;
}

.bio{
    font-size:14px;
    opacity:0.8;
    margin-bottom:20px;
}

/* BUTTON STYLE */
.btn{
    display:block;
    margin:10px 0;
    padding:12px;
    border-radius:12px;
    background: rgba(255,255,255,0.12);
    color:white;
    text-decoration:none;
    transition:0.3s;
    font-weight:500;
}

.btn:hover{
    background: rgba(255,255,255,0.25);
    transform: scale(1.03);
}

/* SECTION */
.section{
    margin-top:15px;
    text-align:left;
    font-size:14px;
    opacity:0.9;
}

.footer{
    margin-top:20px;
    font-size:12px;
    opacity:0.6;
}
    .typing {
    font-size: 22px;
    font-weight: 600;
    border-right: 2px solid white;
    white-space: nowrap;
    overflow: hidden;
    width: fit-content;
    margin: 0 auto;
    animation: blink 0.7s infinite;
}

@keyframes blink {
    50% {
        border-color: transparent;
    }
}
</style>
</head>

<body>

<div class="card">

<img src="6841707944586560513_avatar.png.png" class="profile">

<h1 class="typing"></h1>
<p class="bio">🚀 Web Developer Beginner | GitHub Enthusiast</p>

<div class="section">
<b>📌 About</b>
<p>Saya sedang belajar Web Development dan membangun project di GitHub.</p>
</div>

<div class="section">
<b>⚡ Skills</b>
<p>HTML • CSS • JavaScript (learning)</p>
</div>

<a class="btn" href="https://github.com/hikmalmaulana07">🐙 GitHub</a>
<a class="btn" href="https://wa.me/628885107619">💬 WhatsApp</a>
<a class="btn" href="https://instagram.com/hkmaal.mlna07">📷 Instagram</a>

<div class="section">
<p id="jam"></p>
</div>

<div class="footer">
Made with ❤️ using GitHub Pages
</div>

</div>

<script>
function updateJam(){
    document.getElementById("jam").textContent =
    new Date().toLocaleTimeString("id-ID");
}
setInterval(updateJam,1000);
updateJam();

    const teks = "Hikmal Maulana";
let i = 0;

function typeEffect(){
    if(i < teks.length){
        document.querySelector(".typing").innerHTML += teks.charAt(i);
        i++;
        setTimeout(typeEffect, 150);
    }
}

typeEffect();
</script>

</body>
</html>
