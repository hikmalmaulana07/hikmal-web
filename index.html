<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hikmal Maulana</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#4f46e5,#7c3aed,#2563eb);
    background-size:400% 400%;
    animation:bg 10s ease infinite;
}

@keyframes bg{
    0%{background-position:0% 50%;}
    50%{background-position:100% 50%;}
    100%{background-position:0% 50%;}
}

.card{
    animation: muncul 1s ease;
    width:90%;
    max-width:420px;
    padding:30px;
    text-align:center;
    border-radius:25px;
    background:rgba(255,255,255,0.12);
    backdrop-filter:blur(15px);
    border:1px solid rgba(255,255,255,0.2);
    color:white;
    box-shadow: 0 8px 30px rgba(0,0,0,0.3),
                0 0 20px rgba(124,58,237,0.4);
    }
}
    @keyframes muncul{
    from{
        opacity:0;
        transform:translateY(30px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
    }

.profile{
    width:160px;
    height:160px;
    border-radius:50%;
    object-fit:cover;
    border:4px solid white;
    margin-bottom:15px;
}

h1{
    margin-bottom:10px;
}

.bio{
    opacity:0.9;
    margin-bottom:20px;
}

.info{
    margin:10px 0;
}

.btn{
    display:inline-block;
    margin-top:15px;
    padding:12px 25px;
    background:white;
    color:#4f46e5;
    text-decoration:none;
    border-radius:12px;
    font-weight:bold;
    transition:0.3s;
}

.btn:hover{
    transform:scale(1.1);
}

.footer{
    margin-top:20px;
    font-size:14px;
    opacity:0.8;
}

h3{
    margin-top:20px;
    margin-bottom:10px;
}

p{
    margin:5px 0;
}

body.dark {
    background: linear-gradient(135deg,#111,#222,#333);
}

body {
    transition: all 0.5s ease;
}
</style>
</head>

<body>

<div class="card">

<img src="6841707944586560513_avatar.png.png" class="profile">

    <h1>Hikmal Maulana</h1>

    <p class="bio">
        🚀 Sedang belajar Web Development & GitHub
    </p>
    <h3 style="margin-top:20px;">Skill</h3>

<p>✅ HTML</p>
<p>✅ GitHub</p>
<p>✅ CSS</p>
<p>🔄 JavaScript (Belajar)</p>

    <div class="info">
        📱 Nomor: 08885107619
    </div>

    <div class="info">
        📍 Indonesia
    </div>

    <a href="https://github.com/hikmalmaulana07" class="btn">
    GitHub Saya
</a>

<br><br>

<a href="https://wa.me/628885107619" class="btn">
    WhatsApp Saya
</a>

    <br><br>

<a href="https://instagram.com/hkmaal.mlna07" class="btn">
    Instagram Saya
</a>
    
    <br><br>
    
<p id="counter">💪 Ditekan: 0 kali</p>
    
<button onclick="semangat()" class="btn">
    💪 Semangat
</button>

    <br><br>

<button onclick="gantiMode()" class="btn">
    🌙 Dark Mode
</button>

    <br><br>

<button onclick="tebakAngka()" class="btn">
    🎮 Tebak Angka
</button>

    <div id="jam" style="margin-top:20px;font-size:20px;"></div>

<div class="footer">
    Dibuat dengan ❤️ menggunakan GitHub Pages
</div>
    
</div>
    
<script>
function updateJam() {
    document.getElementById("jam").textContent =
        new Date().toLocaleTimeString("id-ID");
}
setInterval(updateJam, 1000);
updateJam();

let jumlahKlik = 0;

function semangat(){
    jumlahKlik++;

    document.getElementById("counter").innerHTML =
    "💪 Ditekan: " + jumlahKlik + " kali";

    alert("Jangan menyerah Hikmal! 🚀");
}

function gantiMode(){
    document.body.classList.toggle("dark");
}
    function tebakAngka(){

    let angkaRahasia = Math.floor(Math.random() * 10) + 1;

    let jawaban = prompt("Tebak angka 1 - 10");

    if (jawaban == angkaRahasia) {
    alert("🎉 Benar! Angkanya " + angkaRahasia);
} else {
    alert("❌ Salah! Jawaban yang benar: " + angkaRahasia);
    }

    }
</script>
</body>
</html>
