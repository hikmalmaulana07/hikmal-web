<!DOCTYPE html>  <html lang="id">  
<head>  
<meta charset="UTF-8">  
<meta name="viewport" content="width=device-width, initial-scale=1.0">  
<title>Hikmal Maulana | Portfolio</title>  <style>  
*{  
    margin:0;  
    padding:0;  
    box-sizing:border-box;  
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial;  
}  
  
/* ===== BACKGROUND ===== */  
body{  
    min-height:100vh;  
    display:flex;  
    justify-content:center;  
    align-items:center;  
    background: linear-gradient(135deg,#0f172a,#1e1b4b,#0b1220);  
    color:white;  
    padding:20px;  
    overflow:auto;  
}  
  
/* NEBULA EFFECT */  
body::before{  
    content:"";  
    position:fixed;  
    width:200%;  
    height:200%;  
    background:  
    radial-gradient(circle at 20% 20%, rgba(124,58,237,0.25), transparent 40%),  
    radial-gradient(circle at 80% 80%, rgba(59,130,246,0.2), transparent 40%),  
    radial-gradient(circle at 50% 50%, rgba(16,185,129,0.15), transparent 50%);  
    animation: moveGlow 12s infinite alternate ease-in-out;  
    z-index:-2;  
}  
  
@keyframes moveGlow{  
    from{transform:translate(-10%,-10%);}  
    to{transform:translate(10%,10%);}  
}  
  
/* ===== STARS ===== */  
.stars{  
    position:fixed;  
    width:100%;  
    height:100%;  
    z-index:-1;  
}  
  
.star{  
    position:absolute;  
    width:2px;  
    height:2px;  
    background:white;  
    border-radius:50%;  
    opacity:0.6;  
    animation: floatStar linear infinite;  
    filter:blur(0.3px);  
    box-shadow:0 0 6px white;  
}  
  
@keyframes floatStar{  
    from{  
        transform:translateY(100vh);  
        opacity:0;  
    }  
    30%{opacity:1;}  
    to{  
        transform:translateY(-100vh) translateX(20px);  
        opacity:0;  
    }  
}  
  
/* SHOOTING STAR */  
.shooting-star{  
    position:fixed;  
    width:120px;  
    height:2px;  
    background:linear-gradient(90deg,white,transparent);  
    top:-10vh;  
    left:-10vw;  
    transform:rotate(45deg);  
    opacity:0;  
    animation:shoot 2s linear forwards;  
    z-index:-1;  
}  
  
@keyframes shoot{  
    0%{transform:translate(0,0) rotate(45deg);opacity:0;}  
    10%{opacity:1;}  
    100%{transform:translate(120vw,120vh) rotate(45deg);opacity:0;}  
}  
  
/* ===== CARD ===== */  
.card{  
    width:100%;  
    max-width:420px;  
    padding:25px;  
    border-radius:25px;  
    background:rgba(255,255,255,0.08);  
    backdrop-filter:blur(18px);  
    border:1px solid rgba(255,255,255,0.15);  
    box-shadow:0 10px 40px rgba(0,0,0,0.5),  
               0 0 20px rgba(124,58,237,0.2);  
    text-align:center;  
    transition:0.3s ease;  
    animation:fade 1s ease;  
}  
    .card:hover{  
    box-shadow:0 15px 50px rgba(0,0,0,0.6),  
               0 0 30px rgba(124,58,237,0.4);  
    }  
  
@keyframes fade{  
    from{opacity:0;transform:translateY(20px);}  
    to{opacity:1;transform:translateY(0);}  
}  
  
/* PROFILE */  
.profile{  
    width:110px;  
    height:110px;  
    border-radius:50%;  
    object-fit:cover;  
    border:3px solid white;  
    margin-bottom:15px;  
}  
  
/* TEXT */  
h1{  
    font-size:22px;  
    margin-bottom:5px;  
}  
  
.bio{  
    font-size:14px;  
    opacity:0.8;  
    margin-bottom:20px;  
}  
  
/* TYPEWRITER */  
.typing{  
    font-size:22px;  
    font-weight:600;  
    border-right:2px solid white;  
    white-space:nowrap;  
    overflow:hidden;  
    width:fit-content;  
    margin:0 auto;  
    animation:blink 0.7s infinite;  
}  
  
@keyframes blink{  
    50%{border-color:transparent;}  
}  
  
/* BUTTON */  
.btn{
    display:block;
    width:100%;
    margin:10px 0;
    padding:12px;
    border-radius:12px;
    background:rgba(255,255,255,0.12);
    color:white;
    text-decoration:none;
    transition:0.3s;
    font-weight:500;
    border:none;
    cursor:pointer;
}
  
.btn:hover{  
    background:rgba(255,255,255,0.25);  
    transform:scale(1.03);  
}  
    .btn:active{  
    transform:scale(0.97);  
    }  
  
/* SECTION */  
.section{  
    margin-top:15px;  
    text-align:left;  
    font-size:14px;  
    opacity:0.9;  
}  
  
.footer{  
    margin-top:20px;  
    font-size:12px;  
    opacity:0.6;  
}  
    
    /* ===== LIGHT MODE ===== */
body.light-mode{
    background: linear-gradient(135deg,#f8fafc,#e2e8f0,#cbd5e1);
    color:#111827;
}

body.light-mode::before{
    opacity:0.2;
}

body.light-mode .card{
    background:rgba(255,255,255,0.7);
    color:#111827;
    border:1px solid rgba(0,0,0,0.1);
}

body.light-mode .btn{
    background:rgba(0,0,0,0.08);
    color:#111827;
}

body.light-mode .btn:hover{
    background:rgba(0,0,0,0.15);
}

body.light-mode .typing{
    border-right:2px solid #111827;
}

    .clock{
    margin:15px 0;
    padding:10px;
    border-radius:10px;
    background:rgba(255,255,255,0.08);
    backdrop-filter:blur(10px);
    font-size:15px;
    font-weight:600;
    }

    .greeting{
    margin:10px 0;
    padding:8px;
    border-radius:10px;
    background:rgba(255,255,255,0.08);
    backdrop-filter:blur(10px);
    font-size:16px;
    font-weight:600;
    }

    .skill-bar{
    width:100%;
    height:10px;
    background:rgba(255,255,255,0.15);
    border-radius:20px;
    overflow:hidden;
    margin-bottom:15px;
}

.skill-fill{
    height:100%;
    width:0;
    border-radius:20px;
    text-align:right;
    padding-right:8px;
    font-size:10px;
    line-height:10px;
    color:white;
    transition:2s;
}

.html{
    background:linear-gradient(90deg,#ff512f,#f09819);
}

.css{
    background:linear-gradient(90deg,#2193b0,#6dd5ed);
}

.js{
    background:linear-gradient(90deg,#f7971e,#ffd200);
}
</style>  </head>  <body>  <div class="stars"></div>  <div class="card"> 
    <img src="6841707944586560513_avatar.png" class="profile">

    <div id="greeting" class="greeting"></div>
    
<p class="bio">🚀 Web Developer Beginner | GitHub Enthusiast</p> 

    <div id="clock" class="clock"></div>
    
<div class="section">
    <b>⚡ Skills</b>

    <div class="skill">
        <span>HTML</span>
        <div class="progress">
            <div class="progress-bar html">90%</div>
        </div>
    </div>

    <div class="skill">
        <span>CSS</span>
        <div class="progress">
            <div class="progress-bar css">85%</div>
        </div>
    </div>

    <div class="skill">
        <span>JavaScript</span>
        <div class="progress">
            <div class="progress-bar js">60%</div>
        </div>
    </div>
</div>

<a class="btn" href="https://wa.me/628885107619">💬 WhatsApp</a>

<!-- Tambahkan di sini -->  <audio id="bgMusic" loop>  
    <source src="ssstik.io_1781538196170.mp3" type="audio/mpeg">  
</audio>  <button class="btn" id="musicBtn">🎵 Putar Musik</button>

<div class="footer">  
Made with ❤️ using GitHub Pages  
</div>  </div>  <script>  
/* ===== JAM ===== */  
  
/* ===== TYPING ===== */  
const teks = "Hikmal Maulana";  
let i = 0;  
  
function typeEffect(){  
    const el = document.querySelector(".typing");  
  
    if(i < teks.length){  
        el.innerHTML += teks.charAt(i);  
        i++;  
        setTimeout(typeEffect, 120);  
    } else {  
        setTimeout(()=>{  
            el.innerHTML = "";  
            i = 0;  
            typeEffect();  
        },2000);  
    }  
}  
typeEffect();  
  
/* ===== STARS ===== */  
function createStars(){  
    const container = document.querySelector(".stars");  
  
    for(let i=0;i<80;i++){  
        let star = document.createElement("div");  
        star.classList.add("star");  
  
        star.style.left = Math.random()*100 + "vw";  
        star.style.top = Math.random()*100 + "vh";  
        star.style.animationDuration = (Math.random()*5+3)+"s";  
  
        container.appendChild(star);  
    }  
}  
createStars();  
  
/* ===== SHOOTING STAR ===== */  
function shoot(){  
    const star = document.createElement("div");  
    star.classList.add("shooting-star");  
    document.body.appendChild(star);  
  
    setTimeout(()=>star.remove(),2000);  
}  
  
setInterval(()=>{  
    if(Math.random()>0.6){  
        shoot();  
    }  
},3000);  
  
/* ===== PARALLAX + HOVER FINAL ===== */  
const card = document.querySelector(".card");  
  
let isHover = false;  
  
card.addEventListener("mouseenter", ()=>{  
    isHover = true;  
});  
  
card.addEventListener("mouseleave", ()=>{  
    isHover = false;  
});  
  
document.addEventListener("mousemove",(e)=>{  
    const x = (window.innerWidth/2 - e.clientX)/50;  
    const y = (window.innerHeight/2 - e.clientY)/50;  
  
    const scale = isHover ? 1.05 : 1.02;  
  
    card.style.transform =  
        `translate(${x}px,${y}px) scale(${scale})`;  
});  
  
    const music = document.getElementById("bgMusic");  
const musicBtn = document.getElementById("musicBtn");  
  
let playing = false;  
  
musicBtn.addEventListener("click", () => {  
    if (!playing) {  
        music.play();  
        musicBtn.textContent = "⏸️ Hentikan Musik";  
        playing = true;  
    } else {  
        music.pause();  
        musicBtn.textContent = "🎵 Putar Musik";  
        playing = false;  
    }  
}); 

    const themeBtn = document.getElementById("themeBtn");

const savedTheme = localStorage.getItem("theme");

if (savedTheme === "light") {
    document.body.classList.add("light-mode");
    themeBtn.textContent = "🌙 Dark Mode";
} else {
    themeBtn.textContent = "☀️ Light Mode";
}

themeBtn.addEventListener("click", () => {
    document.body.classList.toggle("light-mode");

    if (document.body.classList.contains("light-mode")) {
        localStorage.setItem("theme", "light");
        themeBtn.textContent = "🌙 Dark Mode";
    } else {
        localStorage.setItem("theme", "dark");
        themeBtn.textContent = "☀️ Light Mode";
    }
});
    function updateClock() {
    const now = new Date();

    const hari = [
        "Minggu",
        "Senin",
        "Selasa",
        "Rabu",
        "Kamis",
        "Jumat",
        "Sabtu"
    ];

    const bulan = [
        "Januari",
        "Februari",
        "Maret",
        "April",
        "Mei",
        "Juni",
        "Juli",
        "Agustus",
        "September",
        "Oktober",
        "November",
        "Desember"
    ];

    const h = String(now.getHours()).padStart(2, "0");
    const m = String(now.getMinutes()).padStart(2, "0");
    const s = String(now.getSeconds()).padStart(2, "0");

    const tanggal =
        `${hari[now.getDay()]}, ${now.getDate()} ${bulan[now.getMonth()]} ${now.getFullYear()}`;

    document.getElementById("clock").innerHTML =
        `🕒 ${h}:${m}:${s}<br>📅 ${tanggal}`;
}

updateClock();
setInterval(updateClock, 1000);

    function updateGreeting() {
    const hour = new Date().getHours();
    let greeting = "";

    if (hour >= 5 && hour < 11) {
        greeting = "🌅 Selamat Pagi, Hikmal!";
    } else if (hour >= 11 && hour < 15) {
        greeting = "☀️ Selamat Siang, Hikmal!";
    } else if (hour >= 15 && hour < 18) {
        greeting = "🌇 Selamat Sore, Hikmal!";
    } else {
        greeting = "🌙 Selamat Malam, Hikmal!";
    }

    document.getElementById("greeting").textContent = greeting;
}

updateGreeting();

    window.addEventListener("load", () => {
    setTimeout(() => {
        document.querySelector(".html").style.width = "90%";
        document.querySelector(".css").style.width = "85%";
        document.querySelector(".js").style.width = "60%";
    }, 500);
});
</script>
